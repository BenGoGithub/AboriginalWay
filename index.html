<script>
// Dossier de base du site ('' si à la racine du domaine, '/aboriginalway' si sous-dossier)
const BASE = '';

// Table de routage : pathname → fichier source (absolu) + image sidebar
const routes = {
  '/':                   { src: '/site/ref/documents/home.html',              img: 'site/ref/image/Bhgrand.jpg'   },
  '/exposition':         { src: '/site/ref/documents/exposition.html',         img: 'site/ref/image/Serpent.jpg'   },
  '/artistes':           { src: '/site/ref/documents/artistes.html',           img: 'site/ref/image/Serpent.jpg'   },
  '/photos':             { src: '/site/ref/documents/photo.html',              img: 'site/ref/image/Serpent.jpg'   },
  '/animation-peinture': { src: '/site/ref/documents/animation-peinture.html', img: 'site/ref/image/Gecko.jpg'     },
  '/didgeridoo':         { src: '/site/ref/documents/didgeridoo.html',         img: 'site/ref/image/Gecko.jpg'     },
  '/activites':          { src: '/site/ref/documents/activites.html',          img: 'site/ref/image/Gecko.jpg'     },
  '/presentation':       { src: '/site/ref/documents/presentation.html',       img: 'site/ref/image/Libellule.jpg' },
  '/membres':            { src: '/site/ref/documents/membres.html',            img: 'site/ref/image/Libellule.jpg' },
  '/partenaires':        { src: '/site/ref/documents/partenaires.html',        img: 'site/ref/image/Libellule.jpg' },
  '/contact':            { src: '/site/ref/documents/contact.html',            img: 'site/ref/image/Bhpetit.jpg'   },
};

// Charge un script de manière séquentielle (respecte l'ordre jQuery → plugin)
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.onload = resolve;
    script.onerror = reject;
    document.body.appendChild(script);
  });
}

async function navigate(path, pushState = true) {
  const route = routes[path] || routes['/'];

  // Image sidebar
  document.getElementById('visuel').src = route.img;

  try {
    // Chargement du contenu via chemin absolu
    const response = await fetch(route.src);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const html = await response.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Extraire #container (parent de #texte) si disponible, sinon tout le <body>
    // On supprime l'id pour éviter un conflit CSS avec le #container de index.html
    const container = doc.getElementById('container');
    if (container) container.removeAttribute('id');
    const source = container || doc.body;

    // Résoudre tous les src relatifs en URLs absolues avant injection
    // (les pages desktop utilisent ../image/ relatif à leur emplacement)
    const base = window.location.origin + route.src;
    source.querySelectorAll('[src]').forEach(el => {
      try { el.setAttribute('src', new URL(el.getAttribute('src'), base).href); } catch (e) {}
    });

    // Appliquer le background-image du <body> fetché sur #bodytexte
    const bodyStyle = doc.body.getAttribute('style') || '';
    const resolvedBodyStyle = bodyStyle.replace(/url\(['"]?([^'")]+)['"]?\)/g, (match, url) => {
      try { return `url('${new URL(url, base).href}')`; } catch (e) { return match; }
    });
    document.getElementById('bodytexte').style.cssText = resolvedBodyStyle;

    const content = document.getElementById('content');
    content.innerHTML = source.innerHTML;

    // Mise à jour URL et <title>
    const pageTitle = doc.title || 'Aboriginal Way';
    if (pushState) history.pushState({ path }, pageTitle, BASE + (path === '/' ? '/' : path));
    document.title = pageTitle;

    // Galerie photo : charger jQuery puis VisualLightBox en séquence
    if (path === '/photos') {
      if (typeof jQuery === 'undefined') {
        await loadScript('/site/ref/documents/engine/js/jquery.min.js');
      }
      await loadScript('/site/ref/documents/engine/js/visuallightbox.js');
    }

    document.getElementById('content').scrollTop = 0;

  } catch (e) {
    document.getElementById('content').innerHTML =
      '<p style="padding:20px;color:#9B1A1B">Erreur de chargement (' + e.message + '). Veuillez réessayer.</p>';
  }
}

// Bouton retour / avant navigateur
window.addEventListener('popstate', (e) => {
  navigate(e.state?.path || '/', false);
});

// Menus déroulants (inchangé)
function showmenu(elmnt) { document.getElementById(elmnt).style.visibility = 'visible'; }
function hidemenu(elmnt) { document.getElementById(elmnt).style.visibility = 'hidden'; }

document.addEventListener('DOMContentLoaded', () => {
  // Redirection mobile
  if (window.matchMedia('(max-width: 768px)').matches) {
    window.location.replace('mobile/index.html');
    return;
  }

  // Interception des clics sur les liens du menu
  document.querySelectorAll('a[data-route]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      navigate(link.getAttribute('data-route'));
    });
  });

  // Charge la page correspondant à l'URL courante (accès direct, F5)
  // Retire le BASE du pathname pour obtenir la route locale (/exposition, /, etc.)
  const initPath = window.location.pathname.replace(BASE, '') || '/';
  navigate(initPath, false);
});
</script>
</head>
