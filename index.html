<script>
// Dossier de base du site ('' si à la racine du domaine, '/aboriginalway' si sous-dossier)
const BASE = '';

// Table de routage : pathname → fichier source (absolu) + image sidebar
const routes = {
  '/':                   { src: '/site/ref/documents/home.html',              img: 'site/ref/image/Bhgrand.jpg'   },
  '/exposition':         { src: '/site/ref/documents/exposition.html',         img: 'site/ref/image/Serpent.jpg'   },

  '/photos':             { src: '/site/ref/documents/photo.html',              img: 'site/ref/image/Serpent.jpg'   },
  '/animation-peinture': { src: '/site/ref/documents/animation-peinture.html', img: 'site/ref/image/Gecko.jpg'     },
  '/didgeridoo':         { src: '/site/ref/documents/didgeridoo.html',         img: 'site/ref/image/Gecko.jpg'     },
  '/activites':          { src: '/site/ref/documents/activites.html',          img: 'site/ref/image/Gecko.jpg'     },
  '/presentation':       { src: '/site/ref/documents/presentation.html',       img: 'site/ref/image/Libellule.jpg' },
  '/membres':            { src: '/site/ref/documents/membres.html',            img: 'site/ref/image/Libellule.jpg' },
  '/partenaires':        { src: '/site/ref/documents/partenaires.html',        img: 'site/ref/image/Libellule.jpg' },
  '/contact':            { src: '/site/ref/documents/contact.html',            img: 'site/ref/image/Bhpetit.jpg'   },
};

// Lightbox pour la galerie photos
function setupLightbox() {
  const lb = document.createElement('div');
  lb.id = 'aw-lb';
  lb.style.cssText = 'display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:1000;justify-content:center;align-items:center;flex-direction:column;';
  lb.innerHTML =
    '<button id="aw-lb-close" style="position:absolute;top:12px;right:18px;background:none;border:none;color:#fff;font-size:30px;cursor:pointer;line-height:1;">&#x2715;</button>' +
    '<button id="aw-lb-prev" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:52px;cursor:pointer;padding:10px;line-height:1;">&#8249;</button>' +
    '<button id="aw-lb-next" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:52px;cursor:pointer;padding:10px;line-height:1;">&#8250;</button>' +
    '<img id="aw-lb-img" src="" alt="" style="max-width:88%;max-height:82vh;object-fit:contain;display:block;">' +
    '<p id="aw-lb-caption" style="color:#ccc;margin:10px 0 0;font-family:Century Gothic,sans-serif;font-size:13px;text-align:center;"></p>';
  document.body.appendChild(lb);

  let items = [], idx = 0;
  const PHOTO_BASE = '/site/ref/documents/';

  function open(i) {
    idx = (i + items.length) % items.length;
    document.getElementById('aw-lb-img').src = PHOTO_BASE + items[idx].full;
    document.getElementById('aw-lb-caption').textContent = items[idx].caption;
    lb.style.display = 'flex';
  }
  function close() {
    lb.style.display = 'none';
    document.getElementById('aw-lb-img').src = '';
  }

  document.getElementById('aw-lb-close').addEventListener('click', close);
  lb.addEventListener('click', function(e) { if (e.target === lb) close(); });
  document.getElementById('aw-lb-prev').addEventListener('click', function(e) {
    e.stopPropagation();
    if (lb._openFn) lb._openFn(lb._getIdx() - 1);
  });
  document.getElementById('aw-lb-next').addEventListener('click', function(e) {
    e.stopPropagation();
    if (lb._openFn) lb._openFn(lb._getIdx() + 1);
  });
  document.addEventListener('keydown', function(e) {
    if (lb.style.display === 'none') return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft' && lb._openFn) lb._openFn(lb._getIdx() - 1);
    if (e.key === 'ArrowRight' && lb._openFn) lb._openFn(lb._getIdx() + 1);
  });

}

// Initialise les clics sur la grille photos après injection du contenu
function initPhotoGrid() {
  const all = Array.from(document.querySelectorAll('#photo-grid a[data-full]'));
  if (!all.length) return;
  const lb = document.getElementById('aw-lb');
  if (!lb) return;
  const lbImg = document.getElementById('aw-lb-img');
  const lbCap = document.getElementById('aw-lb-caption');
  let items = all.map(function(el) {
    return {
      src: new URL(el.dataset.full, window.location.origin + '/site/ref/documents/photo.html').href,
      caption: el.dataset.caption || ''
    };
  });
  let idx = 0;
  function openLb(i) {
    idx = (i + items.length) % items.length;
    lbImg.src = items[idx].src;
    lbCap.textContent = items[idx].caption;
    lb.style.display = 'flex';
  }
  // Stocker openLb sur l'élément pour que prev/next du setupLightbox puisse l'utiliser
  lb._openFn = openLb;
  lb._getIdx = function() { return idx; };
  lb._getLen = function() { return items.length; };
  all.forEach(function(a, i) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      openLb(i);
    });
  });
}

// Charge un script de manière séquentielle (respecte l'ordre jQuery → plugin)
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.onload = resolve;
    script.onerror = reject;
    document.body.appendChild(script);
  });
}

async function navigate(path, pushState = true) {
  const route = routes[path] || routes['/'];

  // Image sidebar
  document.getElementById('visuel').src = route.img;

  try {
    // Chargement du contenu via chemin absolu
    const response = await fetch(route.src, { headers: { 'X-Fetch-Content': '1' } });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const html = await response.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Extraire #container (parent de #texte) si disponible, sinon tout le <body>
    // On supprime l'id pour éviter un conflit CSS avec le #container de index.html
    const container = doc.getElementById('container');
    if (container) container.removeAttribute('id');
    const source = container || doc.body;

    // Résoudre tous les src relatifs en URLs absolues avant injection
    // (les pages desktop utilisent ../image/ relatif à leur emplacement)
    const base = window.location.origin + route.src;
    source.querySelectorAll('[src]').forEach(el => {
      try { el.setAttribute('src', new URL(el.getAttribute('src'), base).href); } catch (e) {}
    });

    // Fond : noir pour l'accueil, Fond.jpg pour toutes les autres pages
    const bodytexte = document.getElementById('bodytexte');
    if (path === '/') {
      bodytexte.style.backgroundImage = 'none';
      bodytexte.style.backgroundColor = 'black';
    } else {
      bodytexte.style.backgroundImage = "url('/site/ref/image/Fond.jpg')";
      bodytexte.style.backgroundColor = '';
    }

    const content = document.getElementById('content');
    content.innerHTML = source.innerHTML;

    // Galerie photos : attacher les handlers lightbox directement sur les liens
    if (path === '/photos') initPhotoGrid();

    // Mise à jour URL et <title>
    const pageTitle = doc.title || 'Aboriginal Way';
    if (pushState) history.pushState({ path }, pageTitle, BASE + (path === '/' ? '/' : path));
    document.title = pageTitle;

    document.getElementById('content').scrollTop = 0;

  } catch (e) {
    document.getElementById('content').innerHTML =
      '<p style="padding:20px;color:#9B1A1B">Erreur de chargement (' + e.message + '). Veuillez réessayer.</p>';
  }
}

// Bouton retour / avant navigateur
window.addEventListener('popstate', (e) => {
  navigate(e.state?.path || '/', false);
});

// Menus déroulants (inchangé)
function showmenu(elmnt) { document.getElementById(elmnt).style.visibility = 'visible'; }
function hidemenu(elmnt) { document.getElementById(elmnt).style.visibility = 'hidden'; }

document.addEventListener('DOMContentLoaded', () => {
  // Redirection mobile
  if (window.matchMedia('(max-width: 768px)').matches) {
    window.location.replace('mobile/index.html');
    return;
  }

  // Lightbox galerie photos
  setupLightbox();

  // Interception des clics sur les liens du menu
  document.querySelectorAll('a[data-route]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      navigate(link.getAttribute('data-route'));
    });
  });

  // Charge la page correspondant à l'URL courante (accès direct, F5)
  // Retire le BASE du pathname pour obtenir la route locale (/exposition, /, etc.)
  const initPath = window.location.pathname.replace(BASE, '') || '/';
  navigate(initPath, false);
});
</script>
